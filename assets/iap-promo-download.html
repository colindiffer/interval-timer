<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #333; }
        .info {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        #canvas { 
            border: 2px solid #ccc;
            background: white;
            display: block;
            margin: 20px auto;
        }
        button {
            background: #FF6D00;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            margin: 20px auto;
        }
        button:hover {
            background: #D95E05;
        }
        .specs {
            color: #666;
            font-size: 14px;
        }
        .check {
            color: #22C55E;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>IAP Promotional Image Generator</h1>
        
        <div class="info">
            <h3>App Store Requirements:</h3>
            <ul class="specs">
                <li class="check">✓ Format: PNG</li>
                <li class="check">✓ Dimensions: 1024 x 1024 pixels</li>
                <li class="check">✓ DPI: 72</li>
                <li class="check">✓ Color Space: RGB</li>
                <li class="check">✓ Flattened, no transparency</li>
            </ul>
        </div>

        <canvas id="canvas" width="1024" height="1024"></canvas>
        
        <button id="downloadBtn">Download iap-promo.png (1024x1024)</button>
        
        <div class="info">
            <p><strong>Current dimensions:</strong> <span id="dimensions"></span></p>
            <p><strong>File ready:</strong> Click the download button to save the PNG file.</p>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Ensure exact dimensions
        canvas.width = 1024;
        canvas.height = 1024;
        
        // Background gradient
        const grad = ctx.createLinearGradient(0, 0, 0, 1024);
        grad.addColorStop(0, '#16232B');
        grad.addColorStop(1, '#10181F');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 1024, 1024);
        
        // App name
        ctx.fillStyle = '#F6FAFC';
        ctx.font = 'bold 40px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Flash Interval Timer', 512, 140);
        
        // Circle background
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = '#FF6D00';
        ctx.beginPath();
        ctx.arc(512, 420, 180, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
        
        // No Ads Icon
        ctx.strokeStyle = '#FF6D00';
        ctx.lineWidth = 12;
        ctx.beginPath();
        ctx.arc(512, 420, 120, 0, Math.PI * 2);
        ctx.stroke();
        
        // AD text
        ctx.fillStyle = '#FF6D00';
        ctx.font = 'bold 80px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('AD', 512, 420);
        
        // Slash through center
        ctx.strokeStyle = '#FF6D00';
        ctx.lineWidth = 16;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(427, 335);
        ctx.lineTo(597, 505);
        ctx.stroke();
        
        // Main text
        ctx.fillStyle = '#F6FAFC';
        ctx.font = 'bold 56px Arial';
        ctx.fillText('Remove Ads', 512, 620);
        
        // Subtext
        ctx.fillStyle = '#9BB0BD';
        ctx.font = '32px Arial';
        ctx.fillText('Ad-free experience', 512, 680);
        ctx.fillText('Forever', 512, 725);
        
        // Price badge
        ctx.fillStyle = '#FF6D00';
        ctx.beginPath();
        ctx.roundRect(412, 780, 200, 70, 35);
        ctx.fill();
        
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 36px Arial';
        ctx.fillText('£3.99', 512, 820);
        
        // One-time purchase
        ctx.fillStyle = '#657885';
        ctx.font = '24px Arial';
        ctx.fillText('One-time purchase', 512, 900);
        
        // Display dimensions
        document.getElementById('dimensions').textContent = `${canvas.width} x ${canvas.height} pixels`;
        
        // Download button
        document.getElementById('downloadBtn').addEventListener('click', function() {
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = 'iap-promo.png';
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
            }, 'image/png', 1.0);
        });
    </script>
</body>
</html>
