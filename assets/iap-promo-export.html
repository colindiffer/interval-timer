<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 20px; background: #f0f0f0; }
        #canvas { border: 2px solid #ccc; }
    </style>
</head>
<body>
    <h2>Right-click the canvas below and "Save image as..." → PNG</h2>
    <canvas id="canvas" width="1024" height="1024"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Background
        const grad = ctx.createLinearGradient(0, 0, 0, 1024);
        grad.addColorStop(0, '#16232B');
        grad.addColorStop(1, '#10181F');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 1024, 1024);
        
        // App name
        ctx.fillStyle = '#F6FAFC';
        ctx.font = 'bold 40px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Flash Interval Timer', 512, 140);
        
        // Circle background
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = '#FF6D00';
        ctx.beginPath();
        ctx.arc(512, 420, 180, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
        
        // No Ads Icon
        ctx.strokeStyle = '#FF6D00';
        ctx.lineWidth = 12;
        ctx.beginPath();
        ctx.arc(512, 420, 120, 0, Math.PI * 2);
        ctx.stroke();
        
        // AD text
        ctx.fillStyle = '#FF6D00';
        ctx.font = 'bold 80px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('AD', 512, 420);
        
        // Slash
        ctx.strokeStyle = '#FF6D00';
        ctx.lineWidth = 16;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(427, 335);
        ctx.lineTo(597, 505);
        ctx.stroke();
        
        // Main text
        ctx.fillStyle = '#F6FAFC';
        ctx.font = 'bold 56px Arial';
        ctx.fillText('Remove Ads', 512, 620);
        
        // Subtext
        ctx.fillStyle = '#9BB0BD';
        ctx.font = '32px Arial';
        ctx.fillText('Ad-free experience', 512, 680);
        ctx.fillText('Forever', 512, 725);
        
        // Price badge
        ctx.fillStyle = '#FF6D00';
        ctx.beginPath();
        ctx.roundRect(412, 780, 200, 70, 35);
        ctx.fill();
        
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 36px Arial';
        ctx.fillText('£3.99', 512, 820);
        
        // One-time purchase
        ctx.fillStyle = '#657885';
        ctx.font = '24px Arial';
        ctx.fillText('One-time purchase', 512, 900);
    </script>
</body>
</html>
