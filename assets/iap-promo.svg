<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#10181F"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16232B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10181F;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#grad)"/>
  
  <!-- App name -->
  <text x="512" y="140" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#F6FAFC" text-anchor="middle">Flash Interval Timer</text>
  
  <!-- Circle background -->
  <circle cx="512" cy="420" r="180" fill="#FF6D00" opacity="0.15"/>
  
  <!-- No Ads Icon (Circle with slash) -->
  <circle cx="512" cy="420" r="120" fill="none" stroke="#FF6D00" stroke-width="12"/>
  <text x="512" y="405" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#FF6D00" text-anchor="middle" dominant-baseline="middle">AD</text>
  <line x1="427" y1="335" x2="597" y2="505" stroke="#FF6D00" stroke-width="16" stroke-linecap="round"/>
  
  <!-- Main text -->
  <text x="512" y="620" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#F6FAFC" text-anchor="middle">Remove Ads</text>
  
  <!-- Subtext -->
  <text x="512" y="680" font-family="Arial, sans-serif" font-size="32" fill="#9BB0BD" text-anchor="middle">Ad-free experience</text>
  <text x="512" y="725" font-family="Arial, sans-serif" font-size="32" fill="#9BB0BD" text-anchor="middle">Forever</text>
  
  <!-- Price badge -->
  <rect x="412" y="780" width="200" height="70" rx="35" fill="#FF6D00"/>
  <text x="512" y="825" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">£3.99</text>
  
  <!-- One-time purchase text -->
  <text x="512" y="900" font-family="Arial, sans-serif" font-size="24" fill="#657885" text-anchor="middle">One-time purchase</text>
</svg>
