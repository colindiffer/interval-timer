<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1024" height="1024">
  <!-- Background: soft light rounded square -->
  <rect width="100" height="100" rx="22" fill="#F4F7FB"/>

  <!-- Side pusher -->
  <rect x="69" y="9" width="12" height="6" rx="3" fill="#FF6D00" transform="rotate(32 69 9)"/>

  <!-- Filled face: primary orange -->
  <circle cx="50" cy="52" r="32" fill="#FF6D00"/>

  <!-- Ring track -->
  <circle cx="50" cy="52" r="37" stroke="#D7E4F7" stroke-width="8" fill="none"/>

  <!-- Timer arc -->
  <path d="M 50 15 A 37 37 0 1 1 20.3 29.9"
        stroke="#FF6D00" stroke-width="8" fill="none"
        stroke-linecap="round"/>

  <!-- Arc end dot (simulates a timer hand) -->
  <circle cx="20.3" cy="29.9" r="5.2" fill="#00E676"/>

  <!-- Lightning bolt -->
  <path d="M 55 29 L 42.5 51 L 50 51 L 43 75 L 58.5 46 L 50.5 46 Z" fill="#FFFFFF"/>
</svg>
