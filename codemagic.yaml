workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic Podcast
    environment:
      node: latest
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
    scripts:
      - name: Install EAS CLI
        script: npm install -g eas-cli

      - name: Build with EAS (handles signing automatically)
        script: eas build --platform ios --profile production --non-interactive

      - name: Submit to TestFlight
        script: eas submit --platform ios --latest --non-interactive
