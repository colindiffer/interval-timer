workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic Podcast
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.differapps.intervaltimer
      node: latest
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install --ignore-scripts

      - name: Expo prebuild
        script: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/IntervalTimer.xcworkspace" \
            --scheme "IntervalTimer"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
