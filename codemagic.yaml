workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic Podcast
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.differapps.intervaltimer
      node: latest
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install --ignore-scripts

      - name: Patch RN Firebase iOS podspec
        script: |
          python3 -c "f='node_modules/@react-native-firebase/app/RNFBApp.podspec';txt=open(f).read();old='  s.source_files        = \"ios/**/*.{h,m}\"\\n';new='  s.source_files        = \"ios/**/*.{h,m}\"\\n\\n  # App must define modules for static framework integration of other packages to work.\\n  # Also allow React Core headers while RNFBApp is built as a framework module.\\n  s.pod_target_xcconfig = {\\n    \"DEFINES_MODULE\" => \"YES\",\\n    \"CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES\" => \"YES\",\\n  }\\n';txt=txt.replace(old,new,1);open(f,'w').write(txt)"

      - name: Expo prebuild
        script: npx expo prebuild --platform ios --no-install

      - name: Patch Podfile for Firebase static frameworks and Xcode 16 fixes
        script: |
          sed -i '' '1s/^/$RNFirebaseAsStaticFramework = true\n/' ios/Podfile
          python3 -c "f='ios/Podfile';txt=open(f).read();patch='\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings[\"CLANG_ENABLE_EXPLICIT_MODULES\"]=\"NO\"\n      config.build_settings[\"CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES\"]=\"YES\"\n    end\n  end';txt=txt.replace('post_install do |installer|','post_install do |installer|'+patch,1);open(f,'w').write(txt)"

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Apply code signing profiles
        script: xcode-project use-profiles

      - name: Create export options plist
        script: |
          cat > /Users/builder/export_options.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.differapps.intervaltimer</key>
                  <string>Interval Timer App Store</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>teamID</key>
              <string>25X2WSWQG6</string>
          </dict>
          </plist>
          PLIST

      - name: Build IPA
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building workspace: $WORKSPACE scheme: $SCHEME"
          if ! xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --export-options-plist /Users/builder/export_options.plist \
            --clean \
            --archive-xcargs "CLANG_ENABLE_EXPLICIT_MODULES=NO" \
            --disable-xcpretty; then
            echo "Build failed. Extracting compiler errors from /tmp/xcodebuild_logs..."
            LOG_FILE=$(find /tmp/xcodebuild_logs -name "*.log" | sort | tail -1)
            echo "Using log: $LOG_FILE"
            if [ -n "$LOG_FILE" ] && [ -f "$LOG_FILE" ]; then
              mkdir -p build/ios/diagnostics
              {
                echo "Using log: $LOG_FILE"
                echo
                grep -n -C 3 "RNFBFirestoreTransactionModule.m\|error:" "$LOG_FILE" | tail -400 || true
              } | tee build/ios/diagnostics/xcode-errors.txt
            fi
            exit 1
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/diagnostics/*.txt
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
