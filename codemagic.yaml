workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic Podcast
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.differapps.intervaltimer
      node: latest
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install --ignore-scripts

      - name: Expo prebuild
        script: npx expo prebuild --platform ios --no-install

      - name: Patch Podfile for Firebase static frameworks and Xcode 16 fixes
        script: |
          sed -i '' '1s/^/$RNFirebaseAsStaticFramework = true\n/' ios/Podfile
          cat >> ios/Podfile << 'RUBY'

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['CLANG_ENABLE_EXPLICIT_MODULES'] = 'NO'
    end
  end
end
RUBY

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Apply code signing profiles
        script: xcode-project use-profiles

      - name: Create export options plist
        script: |
          cat > /Users/builder/export_options.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.differapps.intervaltimer</key>
                  <string>Interval Timer App Store</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>teamID</key>
              <string>25X2WSWQG6</string>
          </dict>
          </plist>
          PLIST

      - name: Build IPA
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building workspace: $WORKSPACE scheme: $SCHEME"
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --export-options-plist /Users/builder/export_options.plist \
            --clean \
            --archive-xcargs "CLANG_ENABLE_EXPLICIT_MODULES=NO" \
            --disable-xcpretty

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
