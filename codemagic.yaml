workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic Podcast
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.differapps.intervaltimer
      node: latest
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install --ignore-scripts

      - name: Patch RN Firebase iOS podspec
        script: |
          python3 -c "f='node_modules/@react-native-firebase/app/RNFBApp.podspec';txt=open(f).read();old='  s.source_files        = \"ios/**/*.{h,m}\"\\n';new='  s.source_files        = \"ios/**/*.{h,m}\"\\n\\n  # App must define modules for static framework integration of other packages to work.\\n  # Also allow React Core headers while RNFBApp is built as a framework module.\\n  s.pod_target_xcconfig = {\\n    \"DEFINES_MODULE\" => \"YES\",\\n    \"CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES\" => \"YES\",\\n  }\\n';txt=txt.replace(old,new,1);open(f,'w').write(txt)"

      - name: Patch RN Firebase Firestore iOS source
        script: |
          python3 -c "f='node_modules/@react-native-firebase/firestore/ios/RNFBFirestore/RNFBFirestoreCollectionModule.m';txt=open(f).read();old='      [RNFBFirestoreCommon\\n          promiseRejectFirestoreException:reject\\n                                    error:[NSException exceptionWithName:\\n                                                           @\"RNFB Firestore: Invalid Aggregate Type\"\\n                                                                  reason:reason\\n                                                                userInfo:nil]];';new='      NSError *invalidAggregateError = [NSError\\n          errorWithDomain:@\"RNFB Firestore\"\\n                       code:0\\n                   userInfo:@{NSLocalizedDescriptionKey : reason}];\\n      [RNFBFirestoreCommon promiseRejectFirestoreException:reject error:invalidAggregateError];';txt=txt.replace(old,new,1);open(f,'w').write(txt)"

      - name: Expo prebuild
        script: npx expo prebuild --platform ios --no-install

      - name: Patch Podfile for Firebase static frameworks and Xcode 16 fixes
        script: |
          sed -i '' '1s/^/$RNFirebaseAsStaticFramework = true\n/' ios/Podfile
          python3 -c "f='ios/Podfile';txt=open(f).read();patch='\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings[\"CLANG_ENABLE_EXPLICIT_MODULES\"]=\"NO\"\n      config.build_settings[\"CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES\"]=\"YES\"\n      if target.name.start_with?(\"RNFB\")\n        config.build_settings[\"CLANG_ENABLE_MODULES\"]=\"NO\"\n      end\n    end\n  end';txt=txt.replace('post_install do |installer|','post_install do |installer|'+patch,1);open(f,'w').write(txt)"

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Build IPA
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building workspace: $WORKSPACE scheme: $SCHEME"
          TEAM_ID=$(security find-identity -p codesigning -v | grep -o '([A-Z0-9]\{10\})' | head -1 | tr -d '()')
          echo "Detected Team ID: $TEAM_ID"
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --clean \
            --archive-xcargs "CLANG_ENABLE_EXPLICIT_MODULES=NO CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM=$TEAM_ID -allowProvisioningUpdates" \
            --export-xcargs=-allowProvisioningUpdates \
            --disable-xcpretty

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/diagnostics/*.txt
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
